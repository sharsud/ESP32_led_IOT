<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PsudoGlow | LED Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fbc531 0%, #ff7675 50%, #74b9ff 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-primary: #6c5ce7;
            --accent-secondary: #00cec9;
            --shadow-pop: 0 12px 24px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.05);
            --border-radius: 24px;
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: flowBackground 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes flowBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dashboard-container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 35px 25px;
            box-shadow: var(--shadow-pop);
            border: 4px solid #ffffff;
            transform: scale(1);
            transition: var(--transition-smooth);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--text-main);
            text-shadow: 2px 2px 0px #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 5px;
        }

        .ip-config {
            background: rgba(255, 255, 255, 0.6);
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 2px dashed rgba(108, 92, 231, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ip-config label {
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-primary);
        }

        .ip-config input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            outline: none;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label.section-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            padding: 15px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            background: #ffffff;
            border: 3px solid #dfe6e9;
            border-radius: 16px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 0px #dfe6e9;
            transition: var(--transition-smooth);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232d3436' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 0px var(--accent-primary);
        }

        optgroup {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            background: #ffffff;
            color: var(--accent-primary);
            padding: 10px;
        }

        option {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: var(--text-main);
            padding: 8px;
        }

        .control-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 0px #dfe6e9;
            border: 3px solid #dfe6e9;
            display: block;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.35s ease, transform 0.35s ease, cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .control-card.hidden {
            display: none !important;
            opacity: 0;
            transform: translateY(15px);
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-header span:first-child {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .badge-val {
            background: var(--accent-primary);
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .badge-val.color-preview {
            background: #000000;
            text-transform: uppercase;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 10px;
            background: #dfe6e9;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            border: 4px solid #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .picker-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            box-shadow: 0 4px 0px #dfe6e9;
            border: 3px solid #dfe6e9;
            transition: var(--transition-smooth);
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        input[type="color"]:hover {
            transform: rotate(15deg) scale(1.05);
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        @media(max-width: 480px) {
            .dashboard-container {
                padding: 25px 15px;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>✨ PsudoGlow 🌞</h1>
        <div class="subtitle"> LED Controller Ecosystem</div>
    </header>
	
	<div class="ip-config">
		<label for="espIP">Target IP:</label>
		<input type="text" id="espIP" value="psudoglow.local" placeholder="e.g. 192.168.1.8" onchange="dispatchParameters()">
	</div>

    <div class="form-group">
        <label for="pattern" class="section-title">🎨 Select Light Animation Effect</label>
        <select id="pattern" onchange="evaluateContextualControls(); dispatchParameters();">
            <optgroup label="✨ Section C: Standard & Solid Foundations">
                <option value="0" selected>Solid Color Picker</option>
                <option value="1">Rainbow Wave</option>
                <option value="2">Rainbow Vortex</option>
                <option value="3">Rainbow With Glitter</option>
            </optgroup>

            <optgroup label="🏃 Section B: Kinetic Pacing & Spatial Textures">
                <option value="4">Confetti Shimmer</option>
                <option value="5">Sinelon Plasma</option>
                <option value="6">BPM Pulse Beats</option>
                <option value="7">Juggle Kinetic Dots</option>
                <option value="8">Fire 2012 Engine</option>
                <option value="9">Pacman Ghost Chase</option>
                <option value="10">Ocean Waves</option>
                <option value="11">Plasma Noise Engine</option>
                <option value="12">Strobe Party Flash</option>
                <option value="13">Meteor Rain Cascade</option>
                <option value="14">Cyberpunk Neon Matrix</option>
                <option value="15">Aurora Borealis Fluid</option>
                <option value="16">Custom Pulse Breathing</option>
                <option value="17">Custom Color Scanner</option>
                <option value="18">Warm Firefly Shimmer</option>
                <option value="19">Cozy Fireplace Crackle</option>
                <option value="20">Moving Pastel Wave</option>
                <option value="21">Organic Nebula Drift</option>
                <option value="22">Lounge Wine Breathing</option>
                <option value="23">Kinetic Sand Glass</option>
                <option value="24">Theatre Marquee Run</option>
                <option value="25">Cosmic Dust Supernova</option>
                <option value="26">Glacial Ice Melt</option>
                <option value="27">Matrix Digital Rain</option>
                <option value="28">Interstellar Warp Drive</option>
                <option value="29">Diamond Prism Shimmer</option>
                <option value="30">Magma Chamber Fissure</option>
                <option value="31">Zen Bamboo Forest</option>
                <option value="32">Electric Tesla Arc</option>
                <option value="33">Tokyo Neon Rain</option>
            </optgroup>

            <optgroup label="🎵 Section A: Sound-Reactive Audio Sync">
                <option value="34">Audio Frequency VU Meter</option>
                <option value="35">Audio Reactive Solid Pulses</option>
                <option value="36">Audio Dual Tone Visualizer</option>
            </optgroup>
        </select>
    </div>

    <div class="control-card">
        <div class="control-header">
            <span>Brightness Intensity</span>
            <span class="badge-val" id="brightnessVal">128</span>
        </div>
        <input type="range" id="brightness" min="0" max="255" value="128" oninput="dispatchParameters()">
    </div>

    <div class="control-card">
        <div class="control-header">
            <span>Active Pixel Count</span>
            <span class="badge-val" id="numLedsVal">212</span>
        </div>
        <input type="range" id="numLeds" min="1" max="300" value="212" oninput="dispatchParameters()">
    </div>

    <div class="control-card" id="wrapperColor">
        <div class="control-header">
            <span>Target Tone Selection</span>
            <span class="badge-val color-preview" id="colorVal">#FF0000</span>
        </div>
        <div class="picker-wrapper">
            <input type="color" id="picker" value="#ff0000" oninput="dispatchParameters()">
            <span style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted);">Tap circle to pick a shade</span>
        </div>
    </div>

    <div class="control-card" id="wrapperSpeed">
        <div class="control-header">
            <span>Animation Velocity (Speed)</span>
            <span class="badge-val" id="speedVal">120</span>
        </div>
        <input type="range" id="speed" min="1" max="255" value="120" oninput="dispatchParameters()">
    </div>

    <div class="control-card" id="wrapperDensity">
        <div class="control-header">
            <span>Spatial Multiplier (Density)</span>
            <span class="badge-val" id="densityVal">30</span>
        </div>
        <input type="range" id="density" min="1" max="100" value="30" oninput="dispatchParameters()">
    </div>

    <div class="control-card" id="wrapperAudioSens">
        <div class="control-header">
            <span>Microphone Sensitivity Gain</span>
            <span class="badge-val" id="audioSensVal">5</span>
        </div>
        <input type="range" id="audioSens" min="1" max="10" value="5" oninput="dispatchParameters()">
    </div>

    <footer>
        Learn with Psudo Boilerplate Core Architecture v1.1
    </footer>
</div>

<script>
    // Global Storage Tracking Objects to protect and scale networking streams
    let currentSliderState = {};
    let lastSentStateString = "";
    let isFetchingKey = false;

    function evaluateContextualControls() {
        var patternId = parseInt(document.getElementById('pattern').value);
        
        var cardColor = document.getElementById('wrapperColor');
        var cardSpeed = document.getElementById('wrapperSpeed');
        var cardDensity = document.getElementById('wrapperDensity');
        var cardSens = document.getElementById('wrapperAudioSens');

        cardColor.classList.add('hidden');
        cardSpeed.classList.add('hidden');
        cardDensity.classList.add('hidden');
        cardSens.classList.add('hidden');

        if (patternId === 0) {
            cardColor.classList.remove('hidden');
        } else if (patternId >= 1 && patternId <= 3) {
            cardSpeed.classList.remove('hidden');
            cardDensity.classList.remove('hidden');
        } else if (patternId >= 4 && patternId <= 33) {
            cardSpeed.classList.remove('hidden');
            cardDensity.classList.remove('hidden');
        } else if (patternId >= 34 && patternId <= 36) {
            cardSpeed.classList.remove('hidden');
            cardSens.classList.remove('hidden');
        }
    }

    // Fully automated background handshake to intercept the key before prompt execution
    async function getStoredApiKey() {
        let key = localStorage.getItem('psudoglow_api_key');
        if (key) return key;

        // If we are currently negotiating a fetch hook, exit context early
        if (isFetchingKey) return "";
        isFetchingKey = true;

        var ip = document.getElementById('espIP').value.trim();
        if (!ip.startsWith('http://') && !ip.startsWith('https://')) { ip = 'http://' + ip; }
        if (!ip.endsWith('/')) { ip = ip + '/'; }

        try {
            console.log("Contacting unauthenticated key verification layer...");
            const response = await fetch(ip + 'get-key');
            if (response.ok) {
                const data = await response.json();
                if (data.apiKey && data.apiKey.trim() !== "") {
                    key = data.apiKey.toUpperCase().trim();
                    localStorage.setItem('psudoglow_api_key', key);
                    console.log("Token footprint successfully resolved automatically.");
                    isFetchingKey = false;
                    return key;
                }
            }
        } catch (error) {
            console.error("Device verification layer offline:", error);
        }

        // Fallback standard security input gate
        isFetchingKey = false;
        key = prompt("Please enter your secret ESP32 API Key to unlock controls:");
        if (key) {
            key = key.toUpperCase().trim();
            localStorage.setItem('psudoglow_api_key', key);
        }
        return key;
    }

    function dispatchParameters() {
        var ip = document.getElementById('espIP').value.trim();
        var pStr = document.getElementById('pattern').value;
        var bStr = document.getElementById('brightness').value;
        var nStr = document.getElementById('numLeds').value;
        var sStr = document.getElementById('speed').value;
        var dStr = document.getElementById('density').value;
        var sensStr = document.getElementById('audioSens').value;
        var colorHex = document.getElementById('picker').value;
        
        // Instant fluid UI feedback metrics updates
        document.getElementById('brightnessVal').innerText = bStr;
        document.getElementById('numLedsVal').innerText = nStr;
        document.getElementById('speedVal').innerText = sStr;
        document.getElementById('densityVal').innerText = dStr;
        document.getElementById('audioSensVal').innerText = sensStr;
        document.getElementById('colorVal').innerText = colorHex.toUpperCase();
        
        // Stash parameter footprint into background object mapping frame
        currentSliderState = { ip, pStr, bStr, nStr, sStr, dStr, sensStr, colorHex };
    }

    // Dedicated Heartbeat sync interval at 20fps (50ms loops)
    setInterval(async () => {
        const stateString = JSON.stringify(currentSliderState);
        
        // Guard check: Exit early if parameters haven't mutated
        if (stateString === lastSentStateString || !currentSliderState.ip) return;
        
        lastSentStateString = stateString;
        
        const { ip, pStr, bStr, nStr, sStr, dStr, sensStr, colorHex } = currentSliderState;
        
        var r = parseInt(colorHex.substring(1,3), 16);
        var g = parseInt(colorHex.substring(3,5), 16);
        var b = parseInt(colorHex.substring(5,7), 16);
        
        var targetIp = ip;
        if (!targetIp.startsWith('http://') && !targetIp.startsWith('https://')) { targetIp = 'http://' + targetIp; }
        if (!targetIp.endsWith('/')) { targetIp = targetIp + '/'; }
        
        var targetUrl = targetIp + 'update?p=' + pStr + 
                                   '&br=' + bStr + 
                                   '&num=' + nStr + 
                                   '&s=' + sStr + 
                                   '&d=' + dStr + 
                                   '&r=' + r + 
                                   '&g=' + g + 
                                   '&bl=' + b + 
                                   '&sens=' + sensStr;
        
        const apiKey = await getStoredApiKey();
        if (!apiKey) return;

        fetch(targetUrl, {
            method: 'GET',
            headers: { 'X-API-KEY': apiKey }
        }).catch(err => console.error("Sync error:", err));
    }, 50);

    window.onload = function() {
        evaluateContextualControls();
        dispatchParameters(); // Seed baseline state definitions
    };
</script>
</body>
</html>
